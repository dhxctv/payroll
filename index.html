                            {userRole === 'EMPLOYEE' && <button onClick={() => setActiveTab('emp-portal')} className={`w-full text-left p-4 rounded-2xl font-bold flex items-center gap-3 transition ${activeTab === 'emp-portal' ? 'bg-orange-600 shadow-lg' : 'text-slate-500 hover:bg-slate-800'}`}><i data-lucide="file-text" className="w-5 h-5"></i> Slip Gaji Saya</button>}

                                            <div className="border-y-2 border-black py-8 grid grid-cols-2 gap-16">
